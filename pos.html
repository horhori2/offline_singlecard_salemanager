<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS — 판매 화면</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#ffffff;--border:#e8e6e0;--border-hover:#d0cec8;
  --text:#1a1a1a;--text2:#6b6966;--text3:#9b9895;
  --green:#2d7d46;--green-bg:#eaf5ee;
  --amber:#8a5c0a;--amber-bg:#fdf3e0;
  --red:#b93535;--red-bg:#fceaea;
  --accent:#1a1a1a;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--accent);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.3px}
.topbar-time{font-size:13px;opacity:.7}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.8}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.scan-area{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.scan-row{display:flex;gap:10px;align-items:center}
.scan-icon{font-size:24px;color:var(--text3);flex-shrink:0}
.scan-input{flex:1;font-size:16px;font-family:'SF Mono','Fira Code',monospace;padding:10px 14px;border:2px solid var(--accent);border-radius:var(--radius-sm);outline:none;background:#fff;letter-spacing:1px}
.scan-input::placeholder{font-family:inherit;letter-spacing:0;font-size:14px;color:var(--text3)}
.scan-btn{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:500;white-space:nowrap}
.scan-btn:active{transform:scale(.97)}
.warn-banner{margin:10px 16px 0;background:var(--amber-bg);border:1px solid #e0a020;border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--amber);display:none;align-items:center;gap:8px;flex-shrink:0}
.warn-banner.on{display:flex}
.cart-area{flex:1;overflow-y:auto;padding:10px 16px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:10px}
.cart-empty i{font-size:48px;opacity:.3}
.cart-empty p{font-size:14px}
.cart-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:all .12s}
.cart-item:hover{border-color:var(--border-hover)}
.item-img{width:44px;height:44px;border-radius:var(--radius-sm);object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.item-img-placeholder{width:44px;height:44px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);font-size:20px}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-code{font-size:11px;color:var(--text3);margin-top:2px;font-family:monospace}
.item-unit{font-size:12px;color:var(--text2);margin-top:2px}
.item-qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .1s;color:var(--text)}
.qty-btn:hover{background:var(--border);border-color:var(--border-hover)}
.qty-btn:active{transform:scale(.93)}
.qty-val{font-size:14px;font-weight:600;min-width:24px;text-align:center}
.item-subtotal{font-size:14px;font-weight:600;min-width:80px;text-align:right;flex-shrink:0}
.item-del{color:var(--text3);cursor:pointer;padding:4px;border-radius:4px;border:none;background:none;font-size:16px;display:flex;align-items:center}
.item-del:hover{color:var(--red);background:var(--red-bg)}
.receipt-area{background:var(--surface);border-top:1px solid var(--border);padding:14px 16px;flex-shrink:0}
.receipt-items{margin-bottom:10px;max-height:100px;overflow-y:auto}
.receipt-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);padding:2px 0}
.receipt-divider{border:none;border-top:1px dashed var(--border);margin:8px 0}
.receipt-total-row{display:flex;justify-content:space-between;align-items:baseline}
.receipt-total-label{font-size:16px;font-weight:600}
.receipt-total-val{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--accent)}
.receipt-count{font-size:12px;color:var(--text3);margin-top:2px}
.action-row{display:flex;gap:10px;margin-top:12px}
.btn-clear{flex:0 0 auto;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .12s}
.btn-clear:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn-checkout{flex:1;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .12s;letter-spacing:-0.3px}
.btn-checkout:hover{background:#333}
.btn-checkout:active{transform:scale(.98)}
.btn-checkout:disabled{opacity:.5;cursor:not-allowed}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:100%;max-width:360px;text-align:center}
.modal-icon{font-size:48px;color:var(--green);margin-bottom:16px}
.modal-title{font-size:20px;font-weight:600;margin-bottom:8px;letter-spacing:-0.4px}
.modal-amount{font-size:36px;font-weight:700;letter-spacing:-1.5px;margin:12px 0}
.modal-items{text-align:left;background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-bottom:20px;font-size:12px}
.modal-item-row{display:flex;justify-content:space-between;padding:3px 0;color:var(--text2)}
.modal-detail{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.8}
.modal-close{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <i class="ti ti-barcode" style="font-size:22px"></i>
    <div>
      <div class="topbar-title">POS 판매 화면</div>
      <div class="topbar-time" id="clock"></div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill"><span class="status-dot"></span><span id="conn-label">연결 중</span></div>
    <a href="dashboard.html" style="color:rgba(255,255,255,.7);font-size:12px;display:flex;align-items:center;gap:4px"><i class="ti ti-arrow-left" style="font-size:14px"></i> 대시보드</a>
  </div>
</div>

<div class="scan-area">
  <div class="scan-row">
    <i class="ti ti-scan scan-icon"></i>
    <input type="text" id="barcode-input" class="scan-input" placeholder="바코드 스캔 또는 직접 입력 후 Enter" autocomplete="off" autofocus onkeydown="if(event.key==='Enter')scanBarcode()">
    <button class="scan-btn" onclick="scanBarcode()"><i class="ti ti-plus"></i> 추가</button>
  </div>
</div>

<div class="warn-banner" id="warn-banner">
  <i class="ti ti-alert-triangle" style="font-size:18px;flex-shrink:0"></i>
  <span id="warn-text"></span>
</div>

<div class="cart-area" id="cart-area">
  <div class="cart-empty">
    <i class="ti ti-barcode"></i>
    <p>바코드를 스캔하면 상품이 추가됩니다</p>
  </div>
</div>

<div class="receipt-area">
  <div class="receipt-items" id="receipt-items"></div>
  <hr class="receipt-divider">
  <div class="receipt-total-row">
    <div>
      <div class="receipt-total-label">합계</div>
      <div class="receipt-count" id="receipt-count">0개 상품</div>
    </div>
    <div class="receipt-total-val" id="total-amount">₩0</div>
  </div>
  <div class="action-row">
    <button class="btn-clear" onclick="clearCart()"><i class="ti ti-trash"></i> 초기화</button>
    <button class="btn-checkout" id="checkout-btn" onclick="checkout()" disabled><i class="ti ti-check"></i> 결제 완료</button>
  </div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-icon"><i class="ti ti-circle-check"></i></div>
    <div class="modal-title">결제 완료</div>
    <div class="modal-amount" id="modal-amount">₩0</div>
    <div class="modal-items" id="modal-items"></div>
    <div class="modal-detail" id="modal-detail"></div>
    <button class="modal-close" onclick="closeModal()">확인 (다음 손님)</button>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let cart = [];
let scanning = false;

async function req(path, opts={}) {
  try {
    const r = await fetch(API+path, {headers:{'Content-Type':'application/json'}, ...opts});
    return await r.json();
  } catch(e) { return null; }
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',weekday:'short',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

async function checkConn() {
  const d = await req('/health');
  document.getElementById('conn-label').textContent = d?.server === 'ok' ? '서버 연결됨' : '오프라인';
}
checkConn(); setInterval(checkConn, 30000);

async function scanBarcode() {
  if(scanning) return;
  const input = document.getElementById('barcode-input');
  const barcode = input.value.trim();
  if(!barcode) return;
  scanning = true;
  input.value = '';
  input.placeholder = '처리 중...';

  // 상품 조회만 (재고 차감은 결제 완료 시)
  const list = await req('/products?search=' + encodeURIComponent(barcode));
  const product = Array.isArray(list) ? list.find(p => p.barcode === barcode) : null;

  scanning = false;
  input.placeholder = '바코드 스캔 또는 직접 입력 후 Enter';
  input.focus();

  if(!product) {
    showWarn('등록되지 않은 바코드입니다: ' + barcode);
    shakeInput();
    return;
  }

  if(product.offline_stock <= 0) {
    showWarn('재고가 없습니다: ' + product.name);
    shakeInput();
    return;
  }

  if(product.pending_online_orders > 0) {
    showWarn('⚠️ 온라인 주문된 상품입니다! (대기: ' + product.pending_online_orders + '개)');
  } else {
    hideWarn();
  }

  addToCart({
    id: product.id,
    barcode: product.barcode,
    name: product.name,
    price: product.offline_price || product.naver_sale_price || 0,
    image_url: product.naver_image_url || '',
    stock: product.offline_stock,
  });
}

function addToCart(product) {
  const existing = cart.find(i => i.barcode === product.barcode);
  if(existing) {
    existing.qty++;
  } else {
    cart.push({...product, qty:1});
  }
  renderCart();
}

function renderCart() {
  const area = document.getElementById('cart-area');
  const receiptEl = document.getElementById('receipt-items');
  const checkoutBtn = document.getElementById('checkout-btn');

  if(!cart.length) {
    area.innerHTML = '<div class="cart-empty"><i class="ti ti-barcode" style="font-size:48px;opacity:.3"></i><p>바코드를 스캔하면 상품이 추가됩니다</p></div>';
    receiptEl.innerHTML = '';
    document.getElementById('total-amount').textContent = '₩0';
    document.getElementById('receipt-count').textContent = '0개 상품';
    checkoutBtn.disabled = true;
    return;
  }

  area.innerHTML = cart.map((item,i) => `
    <div class="cart-item">
      ${item.image_url
        ? `<img class="item-img" src="${item.image_url}" alt="${item.name}" loading="lazy">`
        : `<div class="item-img-placeholder"><i class="ti ti-photo"></i></div>`}
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-code">${item.barcode}</div>
        <div class="item-unit">₩${item.price.toLocaleString()} / 개</div>
      </div>
      <div class="item-qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-val">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i},+1)">+</button>
      </div>
      <div class="item-subtotal">₩${(item.price*item.qty).toLocaleString()}</div>
      <button class="item-del" onclick="removeItem(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');

  receiptEl.innerHTML = cart.map(item =>
    `<div class="receipt-row"><span>${item.name} ×${item.qty}</span><span>₩${(item.price*item.qty).toLocaleString()}</span></div>`
  ).join('');

  const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const count = cart.reduce((s,i) => s + i.qty, 0);
  document.getElementById('total-amount').textContent = '₩' + total.toLocaleString();
  document.getElementById('receipt-count').textContent = count + '개 상품';
  checkoutBtn.disabled = false;
}

function changeQty(idx, delta) {
  cart[idx].qty = Math.max(1, cart[idx].qty + delta);
  renderCart();
}

function removeItem(idx) {
  cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  if(cart.length && !confirm('장바구니를 초기화할까요?')) return;
  cart = [];
  renderCart();
  hideWarn();
  document.getElementById('barcode-input').focus();
}

async function checkout() {
  if(!cart.length) return;

  const btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> 처리 중...';

  // 재고 차감 (상품별 1회 호출, quantity로 수량 전달)
  let allSuccess = true;
  for(const item of cart) {
    const result = await req('/products/barcode/deduct', {
      method: 'POST',
      body: JSON.stringify({barcode: item.barcode, quantity: item.qty, sync_to_naver: true})
    });
    if(!result || result.detail) {
      showWarn('재고 차감 실패: ' + (result?.detail || item.name));
      allSuccess = false;
      break;
    }
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-check"></i> 결제 완료';

  if(!allSuccess) return;

  // 주문 DB 저장
  await req('/offline-orders', {
    method: 'POST',
    body: JSON.stringify({
      items: cart.map(item => ({
        product_id: item.id || null,
        name: item.name,
        barcode: item.barcode,
        quantity: item.qty,
        unit_price: item.price,
      }))
    })
  });

  const total = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const count = cart.reduce((s,i) => s + i.qty, 0);
  const now = new Date().toLocaleString('ko-KR');

  document.getElementById('modal-amount').textContent = '₩' + total.toLocaleString();
  document.getElementById('modal-items').innerHTML = cart.map(item =>
    '<div class="modal-item-row"><span>' + item.name + ' ×' + item.qty + '</span><span>₩' + (item.price*item.qty).toLocaleString() + '</span></div>'
  ).join('');
  document.getElementById('modal-detail').textContent = count + '개 상품 · ' + now;
  document.getElementById('modal-bg').classList.add('on');
}

function closeModal(e) {
  if(e && e.target !== document.getElementById('modal-bg') && !e.target.classList.contains('modal-close')) return;
  document.getElementById('modal-bg').classList.remove('on');
  cart = [];
  renderCart();
  hideWarn();
  document.getElementById('barcode-input').focus();
}

function showWarn(msg) {
  document.getElementById('warn-text').textContent = msg;
  document.getElementById('warn-banner').classList.add('on');
}
function hideWarn() { document.getElementById('warn-banner').classList.remove('on'); }

function shakeInput() {
  const input = document.getElementById('barcode-input');
  input.style.borderColor = 'var(--red)';
  setTimeout(() => input.style.borderColor = 'var(--accent)', 1000);
}

document.getElementById('barcode-input').focus();
</script>
</body>
</html>
